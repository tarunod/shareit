<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socket - Local Network Workspace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-brand">
      <div class="brand-mark">S</div>
      <div class="brand-copy">
        <span class="brand-name">Socket</span>
        <span class="brand-subtitle">Local network messaging and transfers</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <button class="ctrl-btn" id="btn-minimize" type="button" aria-label="Minimize">
        <span></span>
      </button>
      <button class="ctrl-btn" id="btn-maximize" type="button" aria-label="Maximize">
        <span class="outline"></span>
      </button>
      <button class="ctrl-btn close" id="btn-close" type="button" aria-label="Close">
        <span class="cross"></span>
      </button>
    </div>
  </div>

  <main class="app-frame">
    <aside class="left-rail" id="left-rail"></aside>
    <section class="thread-rail" id="thread-rail"></section>
    <section class="main-stage" id="main-stage"></section>
  </main>

  <div class="toast-stack" id="toast-stack"></div>

  <script src="app.js"></script>
</body>
</html>
